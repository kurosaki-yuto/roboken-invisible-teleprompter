appId: com.mienaq.app
productName: Mienaq
directories:
  output: out
  buildResources: resources
files:
  - dist/**/*
  - package.json
  - '!**/*.map'
asarUnpack:
  - node_modules/better-sqlite3/**
mac:
  target:
    - target: dmg
      arch:
        - arm64
        - x64
  category: public.app-category.productivity
  hardenedRuntime: true
  entitlements: resources/entitlements.mac.plist
  entitlementsInherit: resources/entitlements.mac.plist
  extendInfo:
    NSMicrophoneUsageDescription: 会議の音声を文字起こしするためにマイクにアクセスします
    NSCameraUsageDescription: 必要に応じて画面キャプチャを行います
win:
  target:
    - target: nsis
      arch:
        - x64
